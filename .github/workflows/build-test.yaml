          sudo ldconfig
          # Export library path for subsequent steps
          LIB_PATH="/usr/lib:/usr/lib/aarch64-linux-gnu"
          LIB_PATH="${LIB_PATH}:/usr/lib/x86_64-linux-gnu"
          echo "LD_LIBRARY_PATH=${LIB_PATH}:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Verify NSS libraries and environment
        run: |
            echo "=== Library Path Diagnostics ==="
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
            echo ""
            echo "=== NSS Libraries in /usr/lib ==="
            ls -la /usr/lib/libnss* /usr/lib/libnspr* 2>/dev/null || \
              echo "Not found in /usr/lib"
            echo ""
            echo "=== NSS Libraries in /usr/lib/aarch64-linux-gnu ==="
            ls -la /usr/lib/aarch64-linux-gnu/libnss* \
              /usr/lib/aarch64-linux-gnu/libnspr* 2>/dev/null || \
              echo "Not found in /usr/lib/aarch64-linux-gnu"
            echo ""
            echo "=== ldconfig cache ==="
            ldconfig -p | grep -E '(nss|nspr)' || \
              echo "NSS/NSPR not in ldconfig cache"
            echo ""
            echo "=== pkg-config ==="
            pkg-config --exists nss && \
              echo "NSS found: $(pkg-config --modversion nss)" || \
              echo "NSS not found by pkg-config"
            pkg-config --exists nspr && \
              echo "NSPR found: $(pkg-config --modversion nspr)" || \
              echo "NSPR not found by pkg-config"

      - name: "Python tests [pytest] (arm64) ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@aa753462f090101dcb0c4708e9499f55e276e373  # v1.1.2
        with:
          python_version: ${{ matrix.python-version }}
          # yamllint disable-line rule:line-length
          artefact_name: python-nss-ng-arm64-py${{ matrix.python-version }}-coverage
          report_artefact: 'true'
        env:
          LD_LIBRARY_PATH: /usr/lib:/usr/lib/aarch64-linux-gnu

      - name: Post-test diagnostics (if test failed)
        if: failure()
        run: |
            echo "=== POST-TEST DIAGNOSTICS ==="
            echo "Checking where package was actually installed..."
            python3 -m pip list | grep python-nss-ng || \
              echo "Package not in pip list"
            echo ""
            echo "Getting pip show output:"
            python3 -m pip show python-nss-ng || echo "pip show failed"
            echo ""
            echo "Extracting actual installation location:"
            INSTALL_LOC=$(python3 -m pip show python-nss-ng | \
