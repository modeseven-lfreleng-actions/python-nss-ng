---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Runs on a new pull request, performs build and runs tests
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: 'Clear all Python dependency caches'
        type: boolean
        default: false
        required: false
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  actions: write  # Required for cache deletion when clear_cache is true

jobs:
  repository-metadata:
    name: "Repository Metadata"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: "Gather repository metadata"
        id: repo-metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/repository-metadata-action@ceabcd987d13d7bfefd2372e01eebb0ddac45956  # v0.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_summary: 'false'
          gerrit_summary: 'false'
          artifact_upload: 'true'
          artifact_formats: 'json'

  python-metadata:
    name: 'Extract Project Metadata'
    runs-on: ubuntu-latest
    outputs:
      matrix_json: "${{ steps.metadata.outputs.python_matrix_json }}"
      project_name: "${{ steps.metadata.outputs.project_name }}"
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: 'Extract Python project metadata'
        id: metadata
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/build-metadata-action@5961894bc1a09891bb5ddf53599737c544a65927  # v0.3.0
        with:
          path_prefix: '.'
          output_format: summary
          include_environment: true
          use_version_extract: true
          verbose: true

  python-build-x64:
    name: "Python Build x64 ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    needs: python-metadata
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-metadata.outputs.matrix_json) }}"
    permissions:
      contents: read
      actions: write  # Required for cache deletion when clear_cache is true
    timeout-minutes: 20
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: "Build Python project ${{ matrix.python-version }}"
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@5f570d5d17a7315074a824a91c6a705b6fc5c7dd  # v1.1.2
        with:
          artefact_name: python-nss-ng-x64-py${{ matrix.python-version }}
          python_version: ${{ matrix.python-version }}
          auditwheel: true
          manylinux_version: manylinux_2_38
          clear_cache: ${{ github.event.inputs.clear_cache || 'false' }}
          make: true
          make_args: 'deps-nss env-github-actions'

  python-build-arm64:
    name: "Python Build ARM64 ${{ matrix.python-version }}"
    runs-on: ubuntu-24.04-arm
    needs: python-metadata
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-metadata.outputs.matrix_json) }}"
    permissions:
      contents: read
      actions: write  # Required for cache deletion when clear_cache is true
    timeout-minutes: 20
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: "Build Python project ${{ matrix.python-version }}"
        id: python-build
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@5f570d5d17a7315074a824a91c6a705b6fc5c7dd  # v1.1.2
        with:
          artefact_name: python-nss-ng-arm64-py${{ matrix.python-version }}
          python_version: ${{ matrix.python-version }}
          auditwheel: true
          manylinux_version: manylinux_2_38
          clear_cache: ${{ github.event.inputs.clear_cache || 'false' }}
          make: true
          make_args: 'deps-nss env-github-actions'

  python-tests-x64:
    name: "Python Tests x64 ${{ matrix.python-version }}"
    runs-on: 'ubuntu-latest'
    needs: ['python-metadata', 'python-build-x64']
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-metadata.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build NSS/NSPR and install system dependencies
        run: |
            # Only install system-level (apt) deps here; pip deps are
            # handled later by python-test-action under the correct
            # actions/setup-python interpreter.
            make deps-nss deps-test-system env-github-actions
            # Ensure NSS libraries are in ldconfig cache
            sudo ldconfig
            # Export library path for subsequent steps
            LIB_PATH="/usr/lib:/usr/lib/aarch64-linux-gnu"
            LIB_PATH="${LIB_PATH}:/usr/lib/x86_64-linux-gnu"
            echo "LD_LIBRARY_PATH=${LIB_PATH}:${LD_LIBRARY_PATH}" \
              >> "$GITHUB_ENV"

      - name: Verify NSS libraries and environment
        run: |
            echo "=== Library Path Diagnostics ==="
            echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"
            echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}"
            echo ""
            echo "=== NSS Libraries in /usr/lib ==="
            ls -la /usr/lib/libnss* /usr/lib/libnspr* 2>/dev/null || \
              echo "Not found in /usr/lib"
            echo ""
            echo "=== NSS Libraries in /usr/lib/x86_64-linux-gnu ==="
            ls -la /usr/lib/x86_64-linux-gnu/libnss* \
              /usr/lib/x86_64-linux-gnu/libnspr* 2>/dev/null || \
              echo "Not found in /usr/lib/x86_64-linux-gnu"
            echo ""
            echo "=== ldconfig cache ==="
            ldconfig -p | grep -E '(nss|nspr)' || \
              echo "NSS/NSPR not in ldconfig cache"
            echo ""
            echo "=== pkg-config ==="
            pkg-config --exists nss && \
              echo "NSS found: $(pkg-config --modversion nss)" || \
              echo "NSS not found by pkg-config"
            pkg-config --exists nspr && \
              echo "NSPR found: $(pkg-config --modversion nspr)" || \
              echo "NSPR not found by pkg-config"

      - name: "Python tests [pytest] ${{ matrix.python-version }}"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-test-action@aa753462f090101dcb0c4708e9499f55e276e373  # v1.1.2
        with:
          python_version: ${{ matrix.python-version }}
          # yamllint disable-line rule:line-length
          artefact_name: python-nss-ng-x64-py${{ matrix.python-version }}-coverage
          report_artefact: 'true'
        env:
          LD_LIBRARY_PATH: /usr/lib:/usr/lib/x86_64-linux-gnu

      - name: Post-test diagnostics (if test failed)
        if: failure()
        run: |
            echo "=== POST-TEST DIAGNOSTICS ==="
            echo "Checking where package was actually installed..."
            python3 -m pip list | grep python-nss-ng || \
              echo "Package not in pip list"
            echo ""
            echo "Getting pip show output:"
            python3 -m pip show python-nss-ng || echo "pip show failed"
            echo ""
            echo "Extracting actual installation location:"
            INSTALL_LOC=$(python3 -m pip show python-nss-ng | \
              grep "Location:" | cut -d' ' -f2)
            echo "Package installed at: ${INSTALL_LOC}"
            if [ -n "${INSTALL_LOC}" ]; then
                echo "Checking for nss package in actual location:"
                ls -la "${INSTALL_LOC}/nss/" 2>/dev/null || \
                  echo "nss directory not found at ${INSTALL_LOC}"
                echo ""
                echo "Checking for .so files in actual location:"
                find "${INSTALL_LOC}/nss/" -name "*.so" 2>/dev/null || \
                  echo "No .so files found"
                echo ""
                echo "Checking library dependencies with ldd:"
                for so_file in "${INSTALL_LOC}/nss/"*.so; do
                    if [ -f "$so_file" ]; then
                        echo "--- $(basename "$so_file") ---"
                        ldd "$so_file" 2>&1 | \
                          grep -E "(nss|nspr|not found)" || true
                    fi
                done
            fi
            echo ""
            echo "Searching for nss package in all locations:"
            PYVER="${{ matrix.python-version }}"
            find /home/runner/.local/lib/python${PYVER}/ -name "nss" \
              -type d 2>/dev/null || echo "Not found in .local"
            find /usr/local/lib/python${PYVER}/ -name "nss" \
              -type d 2>/dev/null || echo "Not found in /usr/local"
            find /usr/lib/python3/dist-packages/ -name "nss" \
              -type d 2>/dev/null || echo "Not found in dist-packages"
            echo ""
            echo "Searching for ANY python-nss-ng files:"
            find /home/runner/.local/lib/python${PYVER}/ \
              -name "*python*nss*" 2>/dev/null | head -20 || true
            find /usr/local/lib/python${PYVER}/ \
              -name "*python*nss*" 2>/dev/null | head -20 || true
            echo ""
            echo "Searching for .so files with nss:"
            find /home/runner/.local/lib/python${PYVER}/ \
              -name "*nss*.so" 2>/dev/null || echo "No .so files found"
            echo ""
            echo "Checking pip cache:"
            ls -la /home/runner/.cache/pip/wheels/ 2>/dev/null || true

  python-tests-arm64:
    name: "Python Tests ARM64 ${{ matrix.python-version }}"
    runs-on: 'ubuntu-24.04-arm'
    needs: ['python-metadata', 'python-build-arm64']
    strategy:
      fail-fast: false
      matrix: "${{ fromJson(needs.python-metadata.outputs.matrix_json) }}"
    permissions:
      contents: read
    timeout-minutes: 12
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Build NSS/NSPR and install system dependencies
        run: |
          # Only install system-level (apt) deps here; pip deps are
          # handled later by python-test-action under the correct
          # actions/setup-python interpreter.
          make deps-nss deps-test-system env-github-actions
