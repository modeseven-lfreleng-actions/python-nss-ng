---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Runs on a new pull request, performs build and runs tests.
#
# Thin caller for the reusable multi-arch Python build/test pipeline. The
# entire pipeline (metadata, build, tests, audit, SBOM and Grype scan,
# fanned out across the x64 + arm64 architecture matrix) lives in
# lfreleng-actions/python-workflows. Native NSS/NSPR prerequisites are
# supplied through the committed setup script consumed by the reusable
# workflow's setup_script input.
name: 'Python Build/Test'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    branches:
      - main
      - master
    paths:
      - '**'
      - '!.github/**'
      - '!.*'
      - '!tox.ini'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  build-test:
    name: 'Build/Test'
    permissions:
      contents: read
      pull-requests: read  # Read PR context for the reusable workflow
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/python-workflows/.github/workflows/build-test-multiarch.yaml@4f48e1cd660f94ab9f1d4bbc15a948c1aca105ad  # v0.1.1
    with:
      # Build NSS/NSPR from source during the python-build step.
      make: true
      make_args: 'deps-nss env-github-actions'
      # Native prerequisites (NSS/NSPR + system test deps) for the test,
      # audit and SBOM jobs, plus LD_LIBRARY_PATH / PKG_CONFIG_PATH export.
      setup_script: '.github/scripts/setup-nss.sh'
