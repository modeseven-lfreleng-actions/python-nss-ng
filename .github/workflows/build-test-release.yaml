---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Runs on a tag push, performs build/test/release.
#
# Thin caller for the reusable multi-arch Python build/test/release
# pipeline in lfreleng-actions/python-workflows. The reusable `release`
# job validates the tag, builds (x64 + arm64), tests, audits, scans,
# attaches artefacts and promotes the draft release. Native NSS/NSPR
# prerequisites are supplied through the committed setup script.
#
# PyPI publishing is performed HERE, not in the reusable workflow: PyPI
# trusted publishing / token credentials are scoped to this repository,
# so the `test-pypi` and `pypi` jobs below download the run-scoped
# 'dist-*' build artefacts the reusable workflow produced and upload them.
name: 'Python Build/Test/Release'

# yamllint disable-line rule:truthy
on:
  # Trigger on tag push events
  push:
    tags:
      - '**'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

env:
  # Harden-runner egress allow-list shared by the publish jobs. Loaded
  # out-of-band from lfreleng-actions/.github and matches the default used
  # inside the reusable workflow.
  # yamllint disable-line rule:line-length
  HARDEN_RUNNER_ALLOWLIST: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

jobs:
  release:
    name: 'Build/Test/Release'
    permissions:
      contents: write       # Create the GitHub release / attach assets
      id-token: write       # OIDC for build provenance attestations
      attestations: write   # Build provenance attestations
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/python-workflows/.github/workflows/build-test-release-multiarch.yaml@4f48e1cd660f94ab9f1d4bbc15a948c1aca105ad  # v0.1.1
    with:
      # Build NSS/NSPR from source during the python-build step.
      make: true
      make_args: 'deps-nss env-github-actions'
      # Native prerequisites (NSS/NSPR + system test deps) for the test,
      # audit and SBOM jobs, plus LD_LIBRARY_PATH / PKG_CONFIG_PATH export.
      setup_script: '.github/scripts/setup-nss.sh'

  # ---------------------------------------------------------------------------
  # PyPI publishing — runs in THIS repository so publishing credentials
  # remain scoped here. The multi-arch build produces several 'dist-*'
  # artefacts, so the publish jobs download them with `artefact_pattern`.
  # ---------------------------------------------------------------------------
  test-pypi:
    name: 'Test PyPI Publishing'
    needs: release
    runs-on: 'ubuntu-latest'
    environment:
      name: 'development'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ env.HARDEN_RUNNER_ALLOWLIST }}

      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Test PyPI publishing'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@8e46bf1bb34889591549c37d949d38fee1ab2d6b  # v0.1.9
        with:
          environment: 'development'
          tag: "${{ needs.release.outputs.tag }}"
          artefact_pattern: 'dist-*'
          pypi_credential: "${{ secrets.TEST_PYPI_CREDENTIAL }}"

  pypi:
    name: 'Release PyPI Package'
    needs:
      - release
      - test-pypi
    runs-on: 'ubuntu-latest'
    environment:
      name: 'production'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below.
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          config: ${{ env.HARDEN_RUNNER_ALLOWLIST }}

      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'PyPI release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@8e46bf1bb34889591549c37d949d38fee1ab2d6b  # v0.1.9
        with:
          environment: 'production'
          attestations: true
          tag: "${{ needs.release.outputs.tag }}"
          artefact_pattern: 'dist-*'
          pypi_credential: "${{ secrets.PYPI_CREDENTIAL }}"
