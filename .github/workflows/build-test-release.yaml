  test-pypi:
    name: 'Test PyPI Publishing'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build-sdist'
      - 'python-tests-x64'
      - 'python-tests-arm64'
      - 'python-audit-x64'
      - 'python-audit-arm64'
    environment:
      name: 'development'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'Test PyPI publishing'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: 'development'
          tag: "${{ needs.tag-validate.outputs.tag }}"
          artefact_pattern: 'python-nss-ng-*'
          pypi_credential: "${{ secrets.TEST_PYPI_CREDENTIAL }}"

  pypi:
    name: 'Release PyPI Package'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build-sdist'
      - 'test-pypi'
    environment:
      name: 'production'
    permissions:
      contents: read
      id-token: write  # IMPORTANT: mandatory for trusted publishing
    timeout-minutes: 5
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      - name: 'PyPI release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/pypi-publish-action@f07400a2b57119f1ceac420f559803264b491f23  # v0.1.6
        with:
          environment: 'production'
          attestations: true
          tag: "${{ needs.tag-validate.outputs.tag }}"
          artefact_pattern: 'python-nss-ng-*'
          pypi_credential: "${{ secrets.PYPI_CREDENTIAL }}"

  # Attach build artefacts prior to release promotion
  # This enables the GitHub immutable releases feature
  attach-artefacts:
    name: 'Attach Artefacts to Release'
    runs-on: 'ubuntu-latest'
    needs:
      - 'tag-validate'
      - 'python-build-sdist'
      - 'python-build-x64'
      - 'python-build-arm64'
      - 'pypi'
    # yamllint disable-line rule:line-length
    permissions:
      contents: write  # IMPORTANT: needed to edit release, attach artefacts
    timeout-minutes: 5
    env:
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: '⬇ Download build artefacts (wheels)'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: 'python-nss-ng-*-py*'
          path: 'dist'
          merge-multiple: true

      - name: '⬇ Download build artefacts (sdist)'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: 'python-nss-ng-sdist'
          path: 'dist'

      - name: 'Attach build artefacts to release'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/release-assets-action@985ecd2ba521dde165514af406dd114d3db5dab6  # v0.1.0
        with:
          asset_paths: '["dist/**"]'
          release_tag: "${{ needs.tag-validate.outputs.tag }}"

  promote-release:
    name: 'Promote Draft Release'
    # yamllint disable-line rule:line-length
    needs:
      - 'tag-validate'
      - 'pypi'
      - 'attach-artefacts'
    runs-on: 'ubuntu-latest'
    permissions:
      # IMPORTANT: needed to edit a draft release and promote it
      contents: write
    timeout-minutes: 2
    outputs:
      release_url: "${{ steps.promote-release.outputs.release_url }}"
    steps:
      # Load the egress allow-list out-of-band from
      # lfreleng-actions/.github and publish it as
      # $CONNECTION_ALLOW_LIST for the harden-runner step below
      # to consume in 'block' mode. Loading out-of-band means
      # the workflow no longer depends on any org-level GitHub
      # variable being exposed at runtime (org variables are
      # unreachable from workflows triggered by PRs raised from
      # forks, which previously forced a fallback to audit mode).
      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/harden-runner-block-action@42663a22f7abe31521cbc6120901353a4b2849bc  # v0.2.0
        with:
          # yamllint disable-line rule:line-length
          config: 'lfreleng-actions//.github/harden-runner/lfreleng-actions/allow_list.txt@18d9c4446bea555d0783e850f6d295f844fe8f67'  # v0.1.1

      # Harden the runner with the just-loaded allow-list.
      - name: 'Harden runner (block)'
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            ${{ env.CONNECTION_ALLOW_LIST }}

      # yamllint disable-line rule:line-length
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: 'Check if release is already promoted'
        id: 'check-promoted'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAG_NAME: "${{ needs.tag-validate.outputs.tag }}"
        run: |
          TAG="${TAG_NAME}"
          if gh release view "$TAG" --json isDraft --jq '.isDraft' \
              2>/dev/null | grep -q "false"; then
            echo "Release $TAG is already promoted, skipping promotion"
            echo "already_promoted=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release $TAG is draft or doesn't exist, " \
                 "proceeding with promotion"
            echo "already_promoted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Promote draft release'
        id: 'promote-release'
        if: steps.check-promoted.outputs.already_promoted == 'false'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/draft-release-promote-action@cd7cf442875ecaea5dbb070d0de94f21ece107c8  # v0.1.3
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag: "${{ needs.tag-validate.outputs.tag }}"
          latest: true

      - name: 'Set release URL for already promoted release'
        if: steps.check-promoted.outputs.already_promoted == 'true'
        shell: bash
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          TAG_NAME: "${{ needs.tag-validate.outputs.tag }}"
        run: |
          TAG="${TAG_NAME}"
          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
